<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Product Management System</h1>

    <table>
        <tr>
            <th>Product</th>
            <th>Unit Price</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>

        <tr>
            <td>Product 1</td>
            <td>300</td>
            <td><input type="number" id="q1" value="0"></td>
            <td><input type="text" id="t1" readonly></td>
        </tr>

        <tr>
            <td>Product 2</td>
            <td>200</td>
            <td><input type="number" id="q2" value="0"></td>
            <td><input type="text" id="t2" readonly></td>
        </tr>

        <tr>
            <td>Product 3</td>
            <td>100</td>
            <td><input type="number" id="q3" value="0"></td>
            <td><input type="text" id="t3" readonly></td>
        </tr>

        <tr>
            <td colspan="3"><button id="calculateTotal"> Grand Total</td>
            <td><input type="text" id="grandTotal" readonly></td>
        </tr>

    </table>



    <script src="script.js"></script>



</body>

</html>
